services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-SedimentraAdmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Sedimentra_2026}
      POSTGRES_DB: ${POSTGRES_DB:-SedimentraDb}
    volumes:
      - gis_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-SedimentraAdmin} -d ${POSTGRES_DB:-SedimentraDb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gis_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gis_api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      # Overrides DATABASE_URL from .env (which uses 'localhost') with the Docker service name 'db'
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-SedimentraAdmin}:${POSTGRES_PASSWORD:-Sedimentra_2026}@db:5432/${POSTGRES_DB:-SedimentraDb}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - upload_tmp:/tmp/gis_uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gis_worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-SedimentraAdmin}:${POSTGRES_PASSWORD:-Sedimentra_2026}@db:5432/${POSTGRES_DB:-SedimentraDb}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - upload_tmp:/tmp/gis_uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: gis_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      # Anonymous volume for node_modules hides host OS binaries and caches them inside container
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  gis_pg_data:
  upload_tmp:
